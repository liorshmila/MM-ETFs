name: Daily DB Update

on:
  schedule:
    - cron: "30 22 * * 1-5"
    - cron: "0 2 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily update
        run: python run_daily_update.py

      - name: Commit updated DB files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add compare.db etfs/*/*.db
          git commit -m "Daily DB update" || echo "No changes to commit"
          git push